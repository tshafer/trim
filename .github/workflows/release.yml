name: Release

# Push a version tag and this builds the app, packages a .dmg, and attaches it
# to a GitHub Release:
#
#   git tag v0.2 && git push origin v0.2
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.2) — no release is published"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build-app.sh derives the build number from the history

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build disk image
        id: build
        run: |
          DMG="$(./make-dmg.sh --version '${{ steps.version.outputs.value }}' --out dist)"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: Trim-${{ steps.version.outputs.value }}-dmg
          path: dist/*.dmg

      - name: Publish release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
          DMG: ${{ steps.build.outputs.dmg }}
        run: |
          cat > notes.md <<'NOTES'
          Download the `.dmg`, open it, and drag Trim to Applications.

          The app is ad-hoc signed and not notarized, so the first launch needs a
          right-click → Open (or `xattr -dr com.apple.quarantine /Applications/Trim.app`).
          NOTES
          gh release create "$GITHUB_REF_NAME" "$DMG" \
            --title "Trim $VERSION" \
            --notes-file notes.md
